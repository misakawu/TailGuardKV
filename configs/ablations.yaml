pilot:
  epsilons: [0.05, 0.10, 0.15]
  deltas: [0.05, 0.10, 0.02]
  memory_budget_modes:
    - full_peak_memory_ratio: 0.70
    - full_peak_memory_ratio: 0.85
    - switch_rate_target: 0.50
    - switch_rate_target: 0.30
    - switch_rate_target: 0.10
ablations:
  qrp_models:
    - metadata_only_table
    - lightgbm
    - small_mlp
  delta_allocation:
    - equal
    - frequency_weighted
    - risk_difficulty_weighted
  feature_sets:
    - metadata_only
    - metadata_attention
    - metadata_attention_logit
controller_targets:
  qrp_ms_per_request: 1.0
  cg_ms_per_request: 0.1
  calibration_build_seconds: 30.0
pilot_pass_criteria:
  h0_tail_risk:
    relative_tail_gap: 2.0
    q95_loss_diff: 0.05
    violation_rate_diff_pp: 10
  h2_ttft_reduction:
    point_estimate: 0.10
    bootstrap_ci_lower: 0.05
  exact_fallback:
    max_ratio: 0.60
    source: quality_oracle_plus_2sigma
